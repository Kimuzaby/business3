<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotiza tu Evento | Hill 'N Grill</title>
    <link rel="icon" type="image/jpg" href="../img/logo.jpg">
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<header>
    <nav>
        <a href="../index.html" class="logo-container">
            <img src="../img/logo.jpg" alt="Hill N Grill" class="logo-img">
            <div class="logo-text-wrap">
                <span class="logo-tag">Restaurante & Bar</span>
                <span class="logo-name">Hill 'N Grill</span>
                <span class="logo-sub">Café y Bar</span>
            </div>
        </a>
        <a href="../index.html" class="btn-back">← Volver al Menú</a>
    </nav>
</header>

<main>
    <section class="quote-header">
        <h1>Cotiza tu Evento</h1>
        <p>Bodas, cumpleaños, corporativos y más · Cotización inmediata</p>
        <br>
    </section>

    <section class="quote-container">
        <form id="event-form" onsubmit="processQuote(event)">

            <div class="form-row">
                <div class="form-group">
                    <label for="event-name">Nombre completo</label>
                    <input type="text" id="event-name" placeholder="Ej: María Ramírez" required>
                </div>
                <div class="form-group">
                    <label for="event-phone">Teléfono de contacto</label>
                    <input type="tel" id="event-phone" placeholder="Ej: 7000-0000" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="event-type">Tipo de evento</label>
                    <select id="event-type" required>
                        <option value="">Selecciona...</option>
                        <option value="Boda">Boda</option>
                        <option value="Cumpleaños">Cumpleaños</option>
                        <option value="Corporativo">Corporativo</option>
                        <option value="Quinceañera">Quinceañera</option>
                        <option value="Graduación">Graduación</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="event-date">Fecha tentativa</label>
                    <input type="date" id="event-date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="event-menu">Menú del Evento</label>
                    <select id="event-menu" onchange="calculateTotal()" required>
                        <option value="" data-price="0">Selecciona un menú...</option>
                        <option value="Menú Típico (Pollo)" data-price="5">Menú Típico Pollo - $5.00 c/u</option>
                        <option value="Menú de Carne" data-price="7">Menú de Carne a la Parrilla - $7.00 c/u</option>
                        <option value="Menú Mar y Tierra" data-price="9">Menú Mar y Tierra - $9.00 c/u</option>
                        <option value="Menú Pelibuey Premium" data-price="12">Menú Pelibuey Premium - $12.00 c/u</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="event-guests">Cantidad de personas</label>
                    <input type="number" id="event-guests" min="1" placeholder="Ej: 30" oninput="calculateTotal()" required>
                </div>
            </div>

            <div class="live-quote-box">
                <div class="live-quote-row"><span>Subtotal Platillos:</span><span id="calc-subtotal">$0.00</span></div>
                <div class="live-quote-row"><span>Logística y Servicio:</span><span id="calc-service">$0.00</span></div>
                <div class="live-quote-total"><span>Total Estimado:</span><span id="calc-total">$0.00</span></div>
            </div>

            <button type="submit" class="btn-submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                Generar PDF y Enviar por WhatsApp
            </button>
        </form>
    </section>
</main>

<footer>
    <div class="footer-inner">
        <div class="footer-logo">Hill 'N Grill</div>
        <div class="footer-sub">Restaurante · Café · Bar</div>
        <p class="footer-copy">© 2026 <strong>Hill 'N Grill</strong> · El Salvador.</p>
    </div>
</footer>

<script>
function calculateTotal() {
    const menuSelect = document.getElementById('event-menu');
    const price = parseFloat(menuSelect.options[menuSelect.selectedIndex].dataset.price || 0);
    const guests = parseInt(document.getElementById('event-guests').value || 0);
    const subtotal = price * guests;
    const serviceFee = subtotal > 0 ? 25.00 : 0.00;
    const total = subtotal + serviceFee;
    document.getElementById('calc-subtotal').innerText = `$${subtotal.toFixed(2)}`;
    document.getElementById('calc-service').innerText = `$${serviceFee.toFixed(2)}`;
    document.getElementById('calc-total').innerText = `$${total.toFixed(2)}`;
    return { price, guests, subtotal, serviceFee, total };
}

function processQuote(event) {
    event.preventDefault();
    const name = document.getElementById('event-name').value;
    const phone = document.getElementById('event-phone').value;
    const date = document.getElementById('event-date').value;
    const eventType = document.getElementById('event-type').value;
    const menuSelect = document.getElementById('event-menu');
    const menuName = menuSelect.options[menuSelect.selectedIndex].value;
    const totals = calculateTotal();

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });
    const pageW = doc.internal.pageSize.getWidth();
    const margin = 40;
    const contentW = pageW - margin * 2;
    const green = [74, 124, 63];
    const dark = [17, 17, 17];
    const amber = [212, 160, 23];
    const grey = [100, 100, 100];
    const lightBg = [245, 250, 245];
    let y = margin;

    doc.setFillColor(...green);
    doc.rect(0, 0, pageW, 75, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(30);
    doc.setTextColor(255, 255, 255);
    doc.text("Hill 'N Grill", pageW / 2, 34, { align: 'center' });
    doc.setFontSize(9);
    doc.setCharSpace(4);
    doc.text('RESTAURANTE · CAFÉ · BAR', pageW / 2, 50, { align: 'center' });
    doc.setCharSpace(0);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text('COTIZACIÓN DE EVENTO', pageW / 2, 65, { align: 'center' });

    y = 100;
    doc.setFillColor(...lightBg);
    doc.setDrawColor(200, 220, 200);
    doc.roundedRect(margin, y, contentW, 85, 6, 6, 'FD');

    doc.setFontSize(8); doc.setTextColor(...grey); doc.setFont('helvetica','normal');
    doc.text('CLIENTE', margin+15, y+18);
    doc.setFontSize(11); doc.setTextColor(...dark); doc.setFont('helvetica','bold');
    doc.text(name, margin+15, y+32);
    doc.setFontSize(8); doc.setTextColor(...grey); doc.setFont('helvetica','normal');
    doc.text('TELÉFONO', margin+15, y+52);
    doc.setFontSize(11); doc.setTextColor(...dark); doc.setFont('helvetica','bold');
    doc.text(phone, margin+15, y+66);

    const col2x = margin + contentW / 2 + 10;
    doc.setFontSize(8); doc.setTextColor(...grey); doc.setFont('helvetica','normal');
    doc.text('TIPO DE EVENTO', col2x, y+18);
    doc.setFontSize(11); doc.setTextColor(...dark); doc.setFont('helvetica','bold');
    doc.text(eventType, col2x, y+32);
    doc.setFontSize(8); doc.setTextColor(...grey); doc.setFont('helvetica','normal');
    doc.text('FECHA TENTATIVA', col2x, y+52);
    doc.setFontSize(11); doc.setTextColor(...dark); doc.setFont('helvetica','bold');
    doc.text(date, col2x, y+66);

    y += 105;
    doc.autoTable({
        startY: y, margin: { left: margin, right: margin },
        head: [['Descripción del Servicio','Cantidad','Precio Unit.','Total']],
        body: [
            [menuName, `${totals.guests} personas`, `$${totals.price.toFixed(2)}`, `$${totals.subtotal.toFixed(2)}`],
            ['Logística, Transporte y Servicio', '1 evento', '$25.00', `$${totals.serviceFee.toFixed(2)}`]
        ],
        headStyles: { fillColor: green, textColor: [255,255,255], fontStyle: 'bold', fontSize: 10, halign: 'center' },
        columnStyles: { 0:{halign:'left',cellWidth:230}, 1:{halign:'center',cellWidth:100}, 2:{halign:'right',cellWidth:90}, 3:{halign:'right',cellWidth:90} },
        bodyStyles: { fontSize: 10, textColor: dark },
        alternateRowStyles: { fillColor: [245, 250, 240] },
        theme: 'striped'
    });

    y = doc.lastAutoTable.finalY + 20;
    const boxW = 240, boxX = pageW - margin - boxW;
    doc.setFillColor(...lightBg); doc.setDrawColor(180, 210, 180);
    doc.roundedRect(boxX, y, boxW, 80, 6, 6, 'FD');
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(...grey);
    doc.text('Subtotal platillos:', boxX+15, y+22);
    doc.setTextColor(...dark); doc.text(`$${totals.subtotal.toFixed(2)}`, boxX+boxW-15, y+22, { align:'right' });
    doc.setTextColor(...grey); doc.text('Logística y servicio:', boxX+15, y+40);
    doc.setTextColor(...dark); doc.text(`$${totals.serviceFee.toFixed(2)}`, boxX+boxW-15, y+40, { align:'right' });
    doc.setDrawColor(...amber); doc.setLineWidth(1.2);
    doc.line(boxX+10, y+52, boxX+boxW-10, y+52);
    doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(...green);
    doc.text('TOTAL ESTIMADO:', boxX+15, y+70);
    doc.text(`$${totals.total.toFixed(2)}`, boxX+boxW-15, y+70, { align:'right' });

    y += 105;
    doc.setFillColor(240, 248, 240); doc.setDrawColor(180, 210, 180);
    doc.setLineDashPattern([4,2], 0);
    doc.roundedRect(margin, y, contentW, 60, 6, 6, 'FD');
    doc.setLineDashPattern([], 0);
    doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(...dark);
    doc.text("¡Gracias por elegir Hill 'N Grill para su evento!", pageW/2, y+24, { align:'center' });
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(...grey);
    doc.text('"Sabor a la parrilla con vista panorámica"', pageW/2, y+42, { align:'center' });

    y += 80;
    doc.setFontSize(8); doc.setTextColor(160,160,160);
    doc.text('Cotización válida por 15 días. Para confirmar, adjunte este PDF en nuestro WhatsApp.', pageW/2, y, { align:'center' });

    const filename = `Cotizacion_HillNGrill_${name.replace(/\s+/g,'_')}.pdf`;
    doc.save(filename);

    setTimeout(() => {
        alert("¡Tu cotización se descargó exitosamente!\n\nSerás redirigido a WhatsApp. Por favor ADJUNTA EL PDF para proceder.");
        const whatsappNumber = '50370483939';
        const message = `¡Hola Hill 'N Grill!\n\nAcabo de generar una cotización en su sitio web para un evento (${eventType}) a nombre de ${name}.\n\nAdjunto el PDF con los detalles para proceder con la reservación. ¡Gracias!`;
        window.location.href = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
    }, 800);
}
</script>
</body>
</html>
