<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina | Hill 'N Grill</title>
    <link rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        :root {
            --green: #4A7C3F;
            --green-dark: #2F5028;
            --amber: #D4A017;
            --charcoal: #1C1C1C;
            --dark: #111111;
            --card-bg: #222222;
            --surface: #2A2A2A;
            --text: #F0EDE8;
            --text-muted: #9A9A8A;
            --border: #3A3A3A;
            --red: #C0392B;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        
        .top-bar { background: var(--charcoal); border-bottom: 2px solid var(--red); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .top-bar h1 { font-size: 1.3rem; color: #ff5252; display: flex; align-items: center; gap: 10px; }
        .sound-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 50px; cursor: pointer; }
        
        .columns { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 120px); }
        .column { flex: 1; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; }
        .column-header { padding: 15px 20px; font-weight: 700; font-size: 1.1rem; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; }
        .column-header.pendiente { color: #ff9800; border-color: #ff9800; }
        .column-header.proceso { color: #2196F3; border-color: #2196F3; }
        .column-header.finalizado { color: var(--green); border-color: var(--green); }
        .column-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; cursor: pointer; transition: all 0.2s; }
        .order-card:hover { border-color: var(--green); }
        .order-card .mesa-badge { background: var(--amber); color: var(--dark); display: inline-block; padding: 3px 12px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; margin-bottom: 8px; }
        .order-card h3 { font-size: 1rem; margin-bottom: 5px; }
        .order-card .items { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; }
        .order-card .total { color: var(--amber); font-weight: 700; }
        .order-card .actions { display: none; margin-top: 10px; gap: 8px; }
        .order-card.expanded .actions { display: flex; }
        .btn-action { padding: 8px 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .btn-preparar { background: #2196F3; color: #fff; }
        .btn-finalizar { background: var(--green); color: #fff; }
        .btn-pagar { background: var(--amber); color: var(--dark); }
        .btn-cancelar { background: var(--red); color: #fff; }
        
        .total-dia { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; margin: 0 20px 20px; border-radius: var(--radius); border: 1px solid var(--amber); }
        .total-dia .amount { font-size: 1.5rem; color: var(--amber); font-weight: 700; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>👨‍🍳 Cocina · Hill 'N Grill</h1>
    <div>
        <button class="sound-toggle" onclick="toggleSound()">🔊 Sonido: ON</button>
        <a href="../index.html" style="color:var(--text-muted);text-decoration:none;margin-left:15px;">← Web</a>
    </div>
</div>

<div class="columns">
    <!-- Pendientes -->
    <div class="column">
        <div class="column-header pendiente">
            <span>⏳ Pendientes</span>
            <span id="count-pendiente">0</span>
        </div>
        <div class="column-body" id="col-pendiente" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
    <!-- En Proceso -->
    <div class="column">
        <div class="column-header proceso">
            <span>🔥 En Proceso</span>
            <span id="count-proceso">0</span>
        </div>
        <div class="column-body" id="col-proceso" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
    <!-- Finalizados -->
    <div class="column">
        <div class="column-header finalizado">
            <span>✅ Finalizados</span>
            <span id="count-finalizado">0</span>
        </div>
        <div class="column-body" id="col-finalizado" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
</div>

<div class="total-dia">
    <span>💰 Ventas del día</span>
    <span class="amount" id="ventas-dia">$0.00</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// Configuración de Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDKmVDbSZcC6JwRG2eJkzPjf42aFVYdWg4",
  authDomain: "hill-n-grill.firebaseapp.com",
  projectId: "hill-n-grill",
  storageBucket: "hill-n-grill.firebasestorage.app",
  messagingSenderId: "409489607164",
  appId: "1:409489607164:web:7ed786bd632b0feb3e4a79"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let soundEnabled = true;

// ===== UTILIDADES =====
function validarId(id) {
    if (!id || id === 'undefined' || id === 'null' || id.trim() === '') {
        console.error('❌ ID inválido:', id);
        return false;
    }
    return true;
}

function playSound() {
    if (!soundEnabled) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.setValueAtTime(1000, ctx.currentTime + 0.1);
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.querySelector('.sound-toggle').textContent = soundEnabled ? '🔊 Sonido: ON' : '🔇 Sonido: OFF';
}

// ===== DRAG & DROP =====
function allowDrop(ev) { 
    ev.preventDefault(); 
}

function drop(ev) {
    ev.preventDefault();
    const pedidoId = ev.dataTransfer.getData('text/plain');
    console.log('🖱️ Drop detectado, ID:', pedidoId);
    
    if (!validarId(pedidoId)) return;
    
    const columnBody = ev.target.closest('.column-body');
    if (!columnBody) return;
    
    const estadoMap = {
        'col-pendiente': 'pendiente',
        'col-proceso': 'en_proceso',
        'col-finalizado': 'finalizado'
    };
    
    const nuevoEstado = estadoMap[columnBody.id];
    if (nuevoEstado) {
        console.log('✅ Moviendo a:', nuevoEstado);
        actualizarEstado(pedidoId, nuevoEstado);
    }
}

function drag(ev) {
    const id = ev.target.closest('.order-card')?.dataset?.id;
    if (!id) {
        console.error('❌ No se encontró data-id en drag');
        return;
    }
    ev.dataTransfer.setData('text/plain', id);
    console.log('🖱️ Drag iniciado, ID:', id);
}

// ===== ACTUALIZAR ESTADO =====
async function actualizarEstado(pedidoId, nuevoEstado) {
    if (!validarId(pedidoId)) {
        alert('Error: ID de pedido inválido');
        return;
    }
    
    console.log('🔄 actualizarEstado:', { pedidoId, nuevoEstado });
    
    if (nuevoEstado === 'cancelado') {
        if (!confirm('¿Estás seguro de cancelar este pedido? Se ocultará del panel.')) {
            return;
        }
    }
    
    try {
        await db.collection('pedidos').doc(pedidoId).update({ 
            estado: nuevoEstado,
            ultimaActualizacion: firebase.firestore.Timestamp.now()
        });
        console.log('✅ Estado actualizado:', pedidoId, '→', nuevoEstado);
    } catch (e) {
        console.error('❌ Error al actualizar estado:', e);
        alert('Error: ' + e.message);
    }
}

// ===== MARCAR PAGADO =====
async function marcarPagado(pedidoId) {
    if (!validarId(pedidoId)) return;
    
    console.log('💵 Marcando pagado:', pedidoId);
    
    try {
        const docRef = db.collection('pedidos').doc(pedidoId);
        const doc = await docRef.get();
        
        if (!doc.exists) {
            alert('El pedido ya no existe');
            return;
        }
        
        const pedido = doc.data();
        const ahora = firebase.firestore.Timestamp.now();
        
        // Actualizar estado
        await docRef.update({ 
            estado: 'pagado', 
            fechaPago: ahora 
        });
        
        // Registrar en ventas
        await db.collection('ventas').add({
            pedidoId: pedidoId,
            mesa: pedido.mesa || 0,
            cliente: pedido.cliente || 'Sin nombre',
            total: pedido.total || 0,
            items: pedido.items || [],
            fecha: pedido.fecha || ahora,
            fechaPago: ahora,
            mesero: pedido.mesero || 'Mesero'
        });
        
        console.log('✅ Pedido pagado y registrado en ventas');
    } catch (e) {
        console.error('❌ Error al marcar pagado:', e);
        alert('Error: ' + e.message);
    }
}

// ===== RENDERIZAR PEDIDOS =====
function renderizarPedidos(snapshot) {
    const columnas = {
        'pendiente': document.getElementById('col-pendiente'),
        'en_proceso': document.getElementById('col-proceso'),
        'finalizado': document.getElementById('col-finalizado')
    };
    
    // Limpiar
    Object.values(columnas).forEach(col => col.innerHTML = '');
    
    let conteo = { pendiente: 0, en_proceso: 0, finalizado: 0 };
    
    if (snapshot.empty) {
        console.log('📡 Snapshot vacío');
    }
    
    snapshot.forEach(doc => {
        const pedido = doc.data();
        const id = doc.id;
        const estado = pedido.estado;
        
        // Saltar no activos
        if (estado === 'pagado' || estado === 'cancelado') return;
        
        // Determinar columna
        let columnaDestino;
        if (estado === 'pendiente') columnaDestino = 'pendiente';
        else if (estado === 'en_proceso') columnaDestino = 'en_proceso';
        else columnaDestino = 'finalizado';
        
        // Crear tarjeta
        const card = document.createElement('div');
        card.className = 'order-card';
        card.draggable = true;
        card.dataset.id = id;
        card.addEventListener('dragstart', drag);
        
        // Click para expandir (solo si no es botón)
        card.addEventListener('click', function(e) {
            if (e.target.tagName !== 'BUTTON') {
                this.classList.toggle('expanded');
            }
        });
        
        const itemsTexto = pedido.items?.map(i => `${i.quantity}x ${i.name}`).join('<br>') || 'Sin items';
        
        let botonesHTML = '';
        if (estado === 'pendiente') {
            botonesHTML += `<button class="btn-action btn-preparar" onclick="manejarClick(event, 'preparar', '${id}')">🔥 Preparar</button>`;
        } else if (estado === 'en_proceso') {
            botonesHTML += `<button class="btn-action btn-finalizar" onclick="manejarClick(event, 'finalizar', '${id}')">✅ Finalizar</button>`;
        } else if (estado === 'finalizado') {
            botonesHTML += `<button class="btn-action btn-pagar" onclick="manejarClick(event, 'pagar', '${id}')">💵 Marcar Pagado</button>`;
        }
        botonesHTML += `<button class="btn-action btn-cancelar" onclick="manejarClick(event, 'cancelar', '${id}')">❌ Cancelar</button>`;
        
        card.innerHTML = `
            <span class="mesa-badge">Mesa ${pedido.mesa || '?'}</span>
            <h3>${pedido.cliente || 'Sin nombre'}</h3>
            <div class="items">${itemsTexto}</div>
            <div class="total">$${(pedido.total || 0).toFixed(2)}</div>
            <div class="actions">${botonesHTML}</div>
        `;
        
        columnas[columnaDestino].appendChild(card);
        conteo[columnaDestino]++;
    });
    
    // Actualizar contadores
    document.getElementById('count-pendiente').textContent = conteo.pendiente;
    document.getElementById('count-proceso').textContent = conteo.en_proceso;
    document.getElementById('count-finalizado').textContent = conteo.finalizado;
    
    console.log('📊 Renderizado:', conteo);
    
    // Actualizar ventas del día
    calcularVentasDia();
}

// ===== MANEJADOR DE CLICS EN BOTONES =====
function manejarClick(event, accion, id) {
    event.stopPropagation();
    event.preventDefault();
    
    console.log('🖱️ Botón:', accion, 'ID:', id);
    
    if (!validarId(id)) return;
    
    switch(accion) {
        case 'preparar':
            actualizarEstado(id, 'en_proceso');
            break;
        case 'finalizar':
            actualizarEstado(id, 'finalizado');
            break;
        case 'pagar':
            marcarPagado(id);
            break;
        case 'cancelar':
            actualizarEstado(id, 'cancelado');
            break;
        default:
            console.error('❌ Acción desconocida:', accion);
    }
}

// ===== VENTAS DEL DÍA =====
async function calcularVentasDia() {
    try {
        const hoy = new Date();
        const inicio = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
        const fin = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate(), 23, 59, 59);
        
        const snapshot = await db.collection('ventas')
            .where('fechaPago', '>=', firebase.firestore.Timestamp.fromDate(inicio))
            .where('fechaPago', '<=', firebase.firestore.Timestamp.fromDate(fin))
            .get();
        
        let total = 0;
        snapshot.forEach(doc => total += doc.data().total || 0);
        
        document.getElementById('ventas-dia').textContent = `$${total.toFixed(2)}`;
    } catch (e) {
        console.error('Error al calcular ventas:', e);
    }
}

// ===== LISTENER EN TIEMPO REAL =====
console.log('🍳 Iniciando listener de cocina...');

db.collection('pedidos')
    .where('estado', 'in', ['pendiente', 'en_proceso', 'finalizado'])
    .onSnapshot(
        snapshot => {
            console.log('📡 Snapshot:', snapshot.size, 'documentos');
            renderizarPedidos(snapshot);
        },
        error => {
            console.error('❌ Error en listener:', error);
            alert('Error de conexión con Firebase. Verifica tu conexión o desactiva el bloqueador de anuncios.');
        }
    );
</script>
</body>
</html>
