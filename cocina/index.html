<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina | Hill 'N Grill</title>
    <link rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        :root {
            --green: #4A7C3F;
            --green-dark: #2F5028;
            --amber: #D4A017;
            --charcoal: #1C1C1C;
            --dark: #111111;
            --card-bg: #222222;
            --surface: #2A2A2A;
            --text: #F0EDE8;
            --text-muted: #9A9A8A;
            --border: #3A3A3A;
            --red: #C0392B;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        
        .top-bar { background: var(--charcoal); border-bottom: 2px solid var(--red); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .top-bar h1 { font-size: 1.3rem; color: #ff5252; display: flex; align-items: center; gap: 10px; }
        .sound-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 50px; cursor: pointer; }
        
        .columns { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 120px); }
        .column { flex: 1; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; }
        .column-header { padding: 15px 20px; font-weight: 700; font-size: 1.1rem; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; }
        .column-header.pendiente { color: #ff9800; border-color: #ff9800; }
        .column-header.proceso { color: #2196F3; border-color: #2196F3; }
        .column-header.finalizado { color: var(--green); border-color: var(--green); }
        .column-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; cursor: pointer; transition: all 0.2s; }
        .order-card:hover { border-color: var(--green); }
        .order-card .mesa-badge { background: var(--amber); color: var(--dark); display: inline-block; padding: 3px 12px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; margin-bottom: 8px; }
        .order-card h3 { font-size: 1rem; margin-bottom: 5px; }
        .order-card .items { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; }
        .order-card .total { color: var(--amber); font-weight: 700; }
        .order-card .actions { display: none; margin-top: 10px; gap: 8px; }
        .order-card.expanded .actions { display: flex; }
        .btn-action { padding: 8px 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .btn-preparar { background: #2196F3; color: #fff; }
        .btn-finalizar { background: var(--green); color: #fff; }
        .btn-pagar { background: var(--amber); color: var(--dark); }
        .btn-cancelar { background: var(--red); color: #fff; }
        
        .total-dia { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; margin: 0 20px 20px; border-radius: var(--radius); border: 1px solid var(--amber); }
        .total-dia .amount { font-size: 1.5rem; color: var(--amber); font-weight: 700; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>👨‍🍳 Cocina · Hill 'N Grill</h1>
    <div>
        <button class="sound-toggle" onclick="toggleSound()">🔊 Sonido: ON</button>
        <a href="../index.html" style="color:var(--text-muted);text-decoration:none;margin-left:15px;">← Web</a>
    </div>
</div>

<div class="columns">
    <!-- Pendientes -->
    <div class="column">
        <div class="column-header pendiente">
            <span>⏳ Pendientes</span>
            <span id="count-pendiente">0</span>
        </div>
        <div class="column-body" id="col-pendiente" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
    <!-- En Proceso -->
    <div class="column">
        <div class="column-header proceso">
            <span>🔥 En Proceso</span>
            <span id="count-proceso">0</span>
        </div>
        <div class="column-body" id="col-proceso" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
    <!-- Finalizados -->
    <div class="column">
        <div class="column-header finalizado">
            <span>✅ Finalizados</span>
            <span id="count-finalizado">0</span>
        </div>
        <div class="column-body" id="col-finalizado" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
</div>

<div class="total-dia">
    <span>💰 Ventas del día</span>
    <span class="amount" id="ventas-dia">$0.00</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// Configuración de Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDKmVDbSZcC6JwRG2eJkzPjf42aFVYdWg4",
  authDomain: "hill-n-grill.firebaseapp.com",
  projectId: "hill-n-grill",
  storageBucket: "hill-n-grill.firebasestorage.app",
  messagingSenderId: "409489607164",
  appId: "1:409489607164:web:7ed786bd632b0feb3e4a79"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let soundEnabled = true;

function playSound() {
    if (soundEnabled) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.setValueAtTime(1000, ctx.currentTime + 0.1);
            osc.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.querySelector('.sound-toggle').textContent = soundEnabled ? '🔊 Sonido: ON' : '🔇 Sonido: OFF';
}

function allowDrop(ev) { 
    ev.preventDefault(); 
}

function drop(ev) {
    ev.preventDefault();
    // Obtener el ID de la tarjeta que se está arrastrando
    const pedidoId = ev.dataTransfer.getData('text/plain');
    
    // Validar que el ID no esté vacío
    if (!pedidoId || pedidoId === 'undefined' || pedidoId === 'null') {
        console.error('❌ Error: pedidoId vacío al hacer drop');
        return;
    }
    
    // Encontrar la columna destino
    const columnBody = ev.target.closest('.column-body');
    if (!columnBody) {
        console.error('❌ Error: no se encontró la columna destino');
        return;
    }
    
    const newEstado = columnBody.id;
    const estadoMap = {
        'col-pendiente': 'pendiente',
        'col-proceso': 'en_proceso',
        'col-finalizado': 'finalizado'
    };
    
    if (estadoMap[newEstado]) {
        console.log('✅ Moviendo pedido', pedidoId, 'a estado:', estadoMap[newEstado]);
        updateEstado(pedidoId, estadoMap[newEstado]);
    }
}

function drag(ev) {
    // Asegurarse de que el data-id existe
    const id = ev.currentTarget.dataset.id;
    if (!id) {
        console.error('❌ Error: data-id no encontrado en la tarjeta');
        return;
    }
    ev.dataTransfer.setData('text/plain', id);
    ev.dataTransfer.effectAllowed = 'move';
}

async function updateEstado(pedidoId, nuevoEstado) {
    // Validar que pedidoId no esté vacío
    if (!pedidoId || pedidoId === 'undefined' || pedidoId === 'null') {
        console.error('❌ Error: pedidoId vacío en updateEstado');
        return;
    }
    
    console.log('🔄 updateEstado:', { pedidoId, nuevoEstado });
    
    try {
        if (nuevoEstado === 'cancelado') {
            if (!confirm('¿Estás seguro de cancelar este pedido? Se eliminará del sistema.')) {
                return;
            }
            // Actualizar estado a 'cancelado' - el onSnapshot lo sacará de la vista
            await db.collection('pedidos').doc(pedidoId).update({ estado: 'cancelado' });
            console.log('✅ Pedido cancelado:', pedidoId);
        } else {
            await db.collection('pedidos').doc(pedidoId).update({ estado: nuevoEstado });
            console.log('✅ Pedido actualizado:', pedidoId, '→', nuevoEstado);
        }
        if (nuevoEstado === 'pendiente') playSound();
    } catch (e) { 
        console.error('❌ Error en updateEstado:', e); 
        alert('Error al actualizar el pedido: ' + e.message);
    }
}

function actualizarContadoresVisuales() {
    const pendientes = document.querySelectorAll('#col-pendiente .order-card').length;
    const proceso = document.querySelectorAll('#col-proceso .order-card').length;
    const finalizados = document.querySelectorAll('#col-finalizado .order-card').length;
    
    document.getElementById('count-pendiente').textContent = pendientes;
    document.getElementById('count-proceso').textContent = proceso;
    document.getElementById('count-finalizado').textContent = finalizados;
}

async function marcarPagado(pedidoId) {
    if (!pedidoId) {
        console.error('❌ Error: pedidoId vacío en marcarPagado');
        return;
    }
    
    try {
        const doc = await db.collection('pedidos').doc(pedidoId).get();
        if (!doc.exists) {
            console.error('❌ El pedido ya no existe');
            return;
        }
        
        const pedido = doc.data();
        
        // Marcar como pagado
        await db.collection('pedidos').doc(pedidoId).update({ 
            estado: 'pagado', 
            fechaPago: firebase.firestore.Timestamp.now() 
        });
        
        // Mover a colección de ventas
        await db.collection('ventas').add({
            pedidoId,
            mesa: pedido.mesa,
            total: pedido.total,
            items: pedido.items,
            fecha: pedido.fecha,
            fechaPago: firebase.firestore.Timestamp.now(),
            mesero: pedido.mesero || 'Mesero'
        });
        
        console.log('✅ Pedido pagado y registrado en ventas:', pedidoId);
        
        // Eliminar tarjeta visualmente
        const card = document.querySelector(`[data-id="${pedidoId}"]`);
        if (card) {
            card.style.opacity = '0';
            card.style.transform = 'scale(0.95)';
            card.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                card.remove();
                actualizarContadoresVisuales();
            }, 300);
        }
        
        calcularVentasDia();
        
    } catch (e) { 
        console.error('❌ Error en marcarPagado:', e); 
    }
}

function renderOrders(snapshot) {
    const cols = {
        'col-pendiente': document.getElementById('col-pendiente'),
        'col-proceso': document.getElementById('col-proceso'),
        'col-finalizado': document.getElementById('col-finalizado')
    };
    const counts = { 'col-pendiente': 0, 'col-proceso': 0, 'col-finalizado': 0 };
    
    // Limpiar columnas
    Object.values(cols).forEach(c => c.innerHTML = '');
    
    snapshot.forEach(doc => {
        const pedido = doc.data();
        const id = doc.id;
        
        // Saltar pedidos no activos
        if (pedido.estado === 'pagado' || pedido.estado === 'cancelado') return;
        
        let colId;
        if (pedido.estado === 'pendiente') colId = 'col-pendiente';
        else if (pedido.estado === 'en_proceso') colId = 'col-proceso';
        else colId = 'col-finalizado';
        
        const card = document.createElement('div');
        card.className = 'order-card';
        card.draggable = true;
        card.dataset.id = id;
        card.addEventListener('dragstart', drag);
        card.addEventListener('click', function(e) {
            // Solo expandir si no se hizo clic en un botón
            if (e.target.tagName !== 'BUTTON') {
                this.classList.toggle('expanded');
            }
        });
        
        const itemsText = pedido.items.map(i => `${i.quantity}x ${i.name}`).join('<br>');
        
        card.innerHTML = `
            <span class="mesa-badge">Mesa ${pedido.mesa}</span>
            <h3>${pedido.cliente}</h3>
            <div class="items">${itemsText}</div>
            <div class="total">$${pedido.total.toFixed(2)}</div>
            <div class="actions">
                ${pedido.estado === 'pendiente' ? `<button class="btn-action btn-preparar" data-accion="preparar" data-id="${id}">🔥 Preparar</button>` : ''}
                ${pedido.estado === 'en_proceso' ? `<button class="btn-action btn-finalizar" data-accion="finalizar" data-id="${id}">✅ Finalizar</button>` : ''}
                ${pedido.estado === 'finalizado' ? `<button class="btn-action btn-pagar" data-accion="pagar" data-id="${id}">💵 Marcar Pagado</button>` : ''}
                <button class="btn-action btn-cancelar" data-accion="cancelar" data-id="${id}">❌ Cancelar</button>
            </div>
        `;
        
        cols[colId].appendChild(card);
        counts[colId]++;
    });
    
    // Agregar event listeners a los botones DESPUÉS de crear las tarjetas
    document.querySelectorAll('.btn-action').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            e.preventDefault();
            
            const accion = this.dataset.accion;
            const id = this.dataset.id;
            
            console.log('🖱️ Botón clickeado:', accion, id);
            
            if (accion === 'preparar') updateEstado(id, 'en_proceso');
            else if (accion === 'finalizar') updateEstado(id, 'finalizado');
            else if (accion === 'pagar') marcarPagado(id);
            else if (accion === 'cancelar') updateEstado(id, 'cancelado');
        });
    });
    
    document.getElementById('count-pendiente').textContent = counts['col-pendiente'];
    document.getElementById('count-proceso').textContent = counts['col-proceso'];
    document.getElementById('count-finalizado').textContent = counts['col-finalizado'];
    
    calcularVentasDia();
}

async function calcularVentasDia() {
    const hoy = new Date();
    const inicioDia = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
    const finDia = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate(), 23, 59, 59);
    
    try {
        const snapshot = await db.collection('ventas')
            .where('fechaPago', '>=', firebase.firestore.Timestamp.fromDate(inicioDia))
            .where('fechaPago', '<=', firebase.firestore.Timestamp.fromDate(finDia))
            .get();
        
        let total = 0;
        snapshot.forEach(doc => {
            total += doc.data().total || 0;
        });
        
        document.getElementById('ventas-dia').textContent = `$${total.toFixed(2)}`;
    } catch (e) {
        console.error('Error al calcular ventas:', e);
    }
}

// Escuchar cambios en tiempo real
db.collection('pedidos')
    .where('estado', 'in', ['pendiente', 'en_proceso', 'finalizado'])
    .onSnapshot(snapshot => {
        console.log('📡 Snapshot recibido:', snapshot.size, 'documentos');
        renderOrders(snapshot);
    }, error => {
        console.error('❌ Error en listener:', error);
    });

console.log('🍳 Cocina inicializada');
</script>
</body>
</html>
