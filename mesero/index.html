<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesero | Hill 'N Grill</title>
    <link rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        :root {
            --green: #4A7C3F;
            --green-dark: #2F5028;
            --green-light: #6AAB5C;
            --amber: #D4A017;
            --amber-light: #F0C040;
            --charcoal: #1C1C1C;
            --dark: #111111;
            --card-bg: #222222;
            --surface: #2A2A2A;
            --text: #F0EDE8;
            --text-muted: #9A9A8A;
            --border: #3A3A3A;
            --red: #C0392B;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        
        .top-bar { background: var(--charcoal); border-bottom: 2px solid var(--green); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .top-bar h1 { font-size: 1.3rem; color: var(--green-light); display: flex; align-items: center; gap: 10px; }
        .top-bar .badge { background: var(--amber); color: var(--dark); padding: 4px 12px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; }
        
        .mesa-selector { background: var(--card-bg); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .mesa-selector label { font-weight: 600; color: var(--green-light); }
        .mesa-selector input { padding: 8px 15px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); font-size: 1rem; width: 100px; }
        .mesa-selector input:focus { outline: none; border-color: var(--green); }
        
        .layout { display: flex; height: calc(100vh - 130px); }
        .menu-panel { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-panel { width: 400px; background: var(--card-bg); border-left: 2px solid var(--green); display: flex; flex-direction: column; }
        .cart-panel h2 { padding: 15px 20px; background: var(--charcoal); color: var(--amber); font-size: 1.1rem; border-bottom: 1px solid var(--border); }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.9rem; }
        .cart-item-price { color: var(--amber); font-size: 0.85rem; margin-top: 3px; }
        .cart-item-qty { display: flex; align-items: center; gap: 8px; }
        .cart-item-qty button { width: 28px; height: 28px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 4px; cursor: pointer; }
        .cart-item-qty button:hover { background: var(--green); border-color: var(--green); }
        .cart-item-qty span { min-width: 25px; text-align: center; font-weight: 700; }
        .cart-footer { padding: 15px 20px; background: var(--charcoal); border-top: 1px solid var(--border); }
        .cart-total { font-size: 1.3rem; font-weight: 700; color: var(--amber); margin-bottom: 12px; display: flex; justify-content: space-between; }
        .btn-send { width: 100%; padding: 12px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn-send:hover { background: var(--green-dark); }
        .btn-clear { width: 100%; padding: 8px; background: transparent; color: #ff5252; border: 1px solid #ff5252; border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; }
        
        .category-tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 18px; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 50px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; font-weight: 600; }
        .tab-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; cursor: pointer; transition: all 0.2s; }
        .product-card:hover { border-color: var(--green); transform: translateY(-3px); }
        .product-card h3 { font-size: 0.95rem; margin-bottom: 5px; }
        .product-card .price { color: var(--amber); font-weight: 700; font-size: 1.1rem; }
        .product-card .desc { color: var(--text-muted); font-size: 0.8rem; margin-top: 5px; }
        
        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .cart-panel { width: 100%; height: 45vh; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>🍽️ Mesero · Hill 'N Grill <span class="badge">Panel Interno</span></h1>
    <a href="../index.html" style="color:var(--text-muted);text-decoration:none;">← Web Pública</a>
</div>

<div class="mesa-selector">
    <label>Mesa #:</label>
    <input type="number" id="mesa-numero" value="1" min="1" max="50">
    <label style="margin-left:15px;">Cliente/Nota:</label>
    <input type="text" id="mesa-nombre" placeholder="Ej: Carlos" style="width:180px;">
</div>

<div class="layout">
    <!-- Menú -->
    <div class="menu-panel">
        <div class="category-tabs">
            <button class="tab-btn active" onclick="filterTab('todas', this)">Todas</button>
            <button class="tab-btn" onclick="filterTab('carnes', this)">Carnes</button>
            <button class="tab-btn" onclick="filterTab('boquitas', this)">Boquitas</button>
            <button class="tab-btn" onclick="filterTab('variado', this)">Variado</button>
            <button class="tab-btn" onclick="filterTab('infantil', this)">Infantil</button>
            <button class="tab-btn" onclick="filterTab('bebidas', this)">Bebidas</button>
            <button class="tab-btn" onclick="filterTab('promos', this)">Promos</button>
        </div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <!-- Carrito -->
    <div class="cart-panel">
        <h2>🧾 Pedido Mesa #<span id="cart-mesa-display">1</span> — <span id="cart-cliente-display">Sin nombre</span></h2>
        <div class="cart-items" id="cart-items-mesero">
            <p style="color:var(--text-muted);text-align:center;padding:40px;">Carrito vacío</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-mesero">$0.00</span>
            </div>
            <button class="btn-clear" onclick="clearCart()">🗑️ Vaciar carrito</button>
            <button class="btn-send" onclick="sendToKitchen()">📤 Enviar a Cocina</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// ⚠️ REEMPLAZA ESTO CON TU CONFIGURACIÓN DE FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDKmVDbSZcC6JwRG2eJkzPjf42aFVYdWg4",
  authDomain: "hill-n-grill.firebaseapp.com",
  projectId: "hill-n-grill",
  storageBucket: "hill-n-grill.firebasestorage.app",
  messagingSenderId: "409489607164",
  appId: "1:409489607164:web:7ed786bd632b0feb3e4a79"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cartMesero = [];
let mesaActual = 1;

// Menú completo
const menuItems = [
    // CARNES
    { id: 'car-1', name: 'Típico (4 chorizos)', price: 5.25, category: 'carnes', desc: 'Casamiento, aguacate, plátanos, queso fresco, 2 tortillas' },
    { id: 'car-2', name: 'Pechuga en Salsa de Loroco', price: 7.25, category: 'carnes', desc: '6 onz, arroz, cebolla curtida, vegetales, 2 tortillas' },
    { id: 'car-3', name: 'Costilla', price: 8.25, category: 'carnes', desc: '1/2 libra, papas fritas, vegetales, tortilla frita, 1 chorizo' },
    { id: 'car-4', name: 'Churrasco', price: 10.75, category: 'carnes', desc: 'Aguacate, casamiento, plátano, chimol, queso fresco, 2 tortillas' },
    { id: 'car-5', name: 'Pelibuey', price: 11.00, category: 'carnes', desc: '8 onz, chimol, casamiento, chorizo, vegetales, 2 tortillas' },
    { id: 'car-6', name: 'Mediterráneo', price: 11.00, category: 'carnes', desc: '4 onz res + 4 onz pechuga, chorizo, arroz, chimol' },
    { id: 'car-7', name: 'Mar y Tierra', price: 15.00, category: 'carnes', desc: '2 camarones, 4 onz carne, 4 onz pechuga, arroz, vegetales' },
    { id: 'car-8', name: 'Parrillada (3 personas)', price: 25.00, category: 'carnes', desc: 'Res, pechuga, costillitas, chorizo, cebolla caramelizada, papas' },
    // BOQUITAS
    { id: 'boq-1', name: 'Pescaditas', price: 4.75, category: 'boquitas', desc: 'Tortilla frita y ensalada' },
    { id: 'boq-2', name: 'Boquita de Res', price: 6.50, category: 'boquitas', desc: 'Carne, chorizo, queso, frijoles, tortilla frita' },
    { id: 'boq-3', name: 'Chicharrón', price: 7.25, category: 'boquitas', desc: 'Chicharrones, chorizo, queso, frijoles, tortilla frita' },
    { id: 'boq-4', name: 'Peliboquitas', price: 8.25, category: 'boquitas', desc: 'Pelibuey, frijoles, queso, chorizo, tortilla frita' },
    { id: 'boq-5', name: 'Costillitas de Cerdo', price: 8.50, category: 'boquitas', desc: 'Tomatada, jalapeño, chorizo, frijoles, queso, tortilla frita' },
    { id: 'boq-6', name: 'Mixtas', price: 10.25, category: 'boquitas', desc: 'Carne, frijoles, pollo, chicharrón, papitas, queso, tortilla frita' },
    // VARIADO
    { id: 'var-1', name: 'Sopa de Gallina', price: 6.25, category: 'variado', desc: '1/4 gallina asada, sopita, aguacate, queso-cuajada, 2 tortillas' },
    { id: 'var-2', name: 'Orden de Tacos', price: 6.75, category: 'variado', desc: 'Taquitos de res, pollo o mixtos' },
    { id: 'var-3', name: 'Cóctel de Camarones', price: 7.00, category: 'variado', desc: 'Camarones frescos en salsa rosa' },
    { id: 'var-4', name: 'Pupusa F/Q y R', price: 1.00, category: 'variado', desc: 'Frijoles, queso y revuelta' },
    { id: 'var-5', name: 'Pupusa Especialidad', price: 1.50, category: 'variado', desc: 'Disponibilidad del día' },
    { id: 'ext-1', name: 'Extra Tortilla c/Frijoles', price: 1.50, category: 'variado', desc: '' },
    { id: 'ext-2', name: 'Extra Papa al Horno', price: 1.50, category: 'variado', desc: '' },
    // INFANTIL
    { id: 'inf-1', name: 'Papitas Fritas', price: 2.25, category: 'infantil', desc: 'Queso rayado y ketchup' },
    { id: 'inf-2', name: 'Nachitos', price: 2.75, category: 'infantil', desc: 'Crujientes y acompañados' },
    { id: 'inf-3', name: 'Hamburguesa Infantil', price: 4.00, category: 'infantil', desc: 'Res o pollo, con/sin queso cheddar' },
    { id: 'inf-4', name: 'Pizza Infantil', price: 4.00, category: 'infantil', desc: 'Jamón o pepperoni' },
    // BEBIDAS
    { id: 'beb-1', name: 'Botella de Agua', price: 0.75, category: 'bebidas', desc: '' },
    { id: 'beb-2', name: 'Café / Té', price: 1.00, category: 'bebidas', desc: '' },
    { id: 'beb-3', name: 'Soda / Refresco', price: 1.00, category: 'bebidas', desc: '' },
    { id: 'beb-4', name: 'Jugo de Naranja', price: 2.00, category: 'bebidas', desc: '' },
    { id: 'beb-5', name: 'Frozen / Cappuccino Ice', price: 2.50, category: 'bebidas', desc: '' },
    { id: 'cer-1', name: 'Pilsener/Golden/Suprema', price: 1.50, category: 'bebidas', desc: 'Cerveza nacional' },
    { id: 'cer-2', name: 'Corona/Modelo', price: 2.00, category: 'bebidas', desc: 'Cerveza importada' },
    // PROMOS
    { id: 'bal-1', name: 'Balde 6 Nacionales', price: 9.90, category: 'promos', desc: 'Pilsener, Golden o Suprema' },
    { id: 'prm-1', name: 'Jueves Alitas + 6 Cervezas', price: 13.00, category: 'promos', desc: '10 alitas + 6 nacionales' }
];

function renderMenu(filter = 'todas') {
    const grid = document.getElementById('menu-grid');
    const items = filter === 'todas' ? menuItems : menuItems.filter(i => i.category === filter);
    grid.innerHTML = items.map(item => `
        <div class="product-card" onclick="addToCartMesero('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price})">
            <h3>${item.name}</h3>
            <div class="price">$${item.price.toFixed(2)}</div>
            ${item.desc ? `<div class="desc">${item.desc}</div>` : ''}
        </div>
    `).join('');
}

function filterTab(cat, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu(cat);
}

function addToCartMesero(id, name, price) {
    const existing = cartMesero.find(i => i.id === id);
    if (existing) { existing.quantity += 1; }
    else { cartMesero.push({ id, name, price, quantity: 1 }); }
    renderCart();
}

function updateQtyMesero(id, change) {
    const idx = cartMesero.findIndex(i => i.id === id);
    if (idx > -1) {
        cartMesero[idx].quantity += change;
        if (cartMesero[idx].quantity <= 0) cartMesero.splice(idx, 1);
    }
    renderCart();
}

function clearCart() {
    if (confirm('¿Vaciar el carrito?')) { cartMesero = []; renderCart(); }
}

function renderCart() {
    const container = document.getElementById('cart-items-mesero');
    const totalEl = document.getElementById('cart-total-mesero');
    mesaActual = parseInt(document.getElementById('mesa-numero').value) || 1;
    document.getElementById('cart-mesa-display').textContent = mesaActual;
    document.getElementById('cart-cliente-display').textContent = document.getElementById('mesa-nombre').value || 'Sin nombre';
    
    if (cartMesero.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">Carrito vacío</p>';
        totalEl.textContent = '$0.00';
        return;
    }
    
    let total = 0;
    container.innerHTML = cartMesero.map(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        return `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">$${subtotal.toFixed(2)}</div>
                </div>
                <div class="cart-item-qty">
                    <button onclick="updateQtyMesero('${item.id}', -1)">−</button>
                    <span>${item.quantity}</span>
                    <button onclick="updateQtyMesero('${item.id}', 1)">+</button>
                </div>
            </div>
        `;
    }).join('');
    totalEl.textContent = `$${total.toFixed(2)}`;
}

async function sendToKitchen() {
    if (cartMesero.length === 0) { alert('El carrito está vacío'); return; }
    mesaActual = parseInt(document.getElementById('mesa-numero').value) || 1;
    const nombreCliente = document.getElementById('mesa-nombre').value || 'Sin nombre';
    const total = cartMesero.reduce((s, i) => s + (i.price * i.quantity), 0);
    
    const pedido = {
        mesa: mesaActual,
        cliente: nombreCliente,
        items: cartMesero.map(i => ({ name: i.name, price: i.price, quantity: i.quantity, subtotal: i.price * i.quantity })),
        total: parseFloat(total.toFixed(2)),
        estado: 'pendiente',
        mesero: 'Mesero',
        fecha: firebase.firestore.Timestamp.now(),
        fechaTexto: new Date().toLocaleString()
    };
    
    try {
        await db.collection('pedidos').add(pedido);
        alert('✅ ¡Pedido enviado a cocina!');
        cartMesero = [];
        
        // ============ NUEVO: Reiniciar campos ============
        document.getElementById('mesa-numero').value = '';
        document.getElementById('mesa-nombre').value = '';
        document.getElementById('cart-mesa-display').textContent = '—';
        document.getElementById('cart-cliente-display').textContent = 'Sin nombre';
        // ================================================
        
        renderCart();
    } catch (error) {
        console.error('Error:', error);
        alert('❌ Error al enviar el pedido. Revisa la consola.');
    }
}

// Inicializar
document.getElementById('mesa-numero').addEventListener('input', () => {
    const val = document.getElementById('mesa-numero').value;
    mesaActual = val ? parseInt(val) : null;
    document.getElementById('cart-mesa-display').textContent = val || '—';
});
document.getElementById('mesa-nombre').addEventListener('input', () => {
    document.getElementById('cart-cliente-display').textContent = document.getElementById('mesa-nombre').value || 'Sin nombre';
});
renderMenu();
</script>
</body>
</html>
